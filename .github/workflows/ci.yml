name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check src tests scripts

      - name: Pytest
        run: pytest
        env:
          LLM_PROVIDER: ollama

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t cyber-ai-template:ci .

      - name: Smoke test container
        run: |
          docker run -d --name cyber-ai-smoke -p 18080:8080 cyber-ai-template:ci
          sleep 5
          curl -f http://localhost:18080/health
          docker stop cyber-ai-smoke
